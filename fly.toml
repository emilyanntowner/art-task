# fly.toml app configuration file for social-influence-task
app = 'test-social-influence-task'
primary_region = 'lax'

[build]

[env]
  DATABASE_URL = "sqlite:////data/social_influence.db"
  FRONTEND_ORIGIN = "https://test-social-influence-task.fly.dev"

# Set via: fly secrets set PROLIFIC_COMPLETION_URL=https://...
# Never hardcode study completion URLs here

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# Persistent volume for SQLite data
# Create once with: fly volumes create social_influence_data --size 1 --region lax
[[mounts]]
  source = "social_influence_data"
  destination = "/data"

